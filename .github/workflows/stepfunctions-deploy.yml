name: CD Step Functions

on:
  push:
    branches: [main]
    paths: ['stepfunctions/*.json']

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-2

      - name: Sync Step Functions
        run: |
          for file in stepfunctions/*.json; do
            NAME=$(basename "$file" .json)
            ARN=$(aws stepfunctions list-state-machines --query "stateMachines[?name=='$NAME'].stateMachineArn" --output text)
            # Transforma o objeto definition em uma string JSON escapada
            DEF_STR=$(jq -c '.definition' "$file" | jq -Rs .)
            ROLE=$(jq -r '.roleArn' "$file")
            
            aws stepfunctions update-state-machine \
              --state-machine-arn "$ARN" \
              --role-arn "$ROLE" \
              --definition "$DEF_STR"
          done
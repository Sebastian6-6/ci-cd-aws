name: CD Step Functions

on:
  push:
    branches: [main]
    paths: ['stepfunctions/**']

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-2

      - name: Update Step Functions
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          REGION="us-east-2"

          for file in stepfunctions/*.json; do
            [ -e "$file" ] || continue
            NAME=$(basename "$file" .json)
            ARN="arn:aws:states:${REGION}:${ACCOUNT_ID}:stateMachine:${NAME}"
            
            echo "--- Atualizando: $NAME ---"

            # 1. Higieniza os nulls do arquivo root para um arquivo temporário limpo
            jq 'del(..|nulls)' "$file" > clean.json

            # 2. Extração segura a partir do arquivo limpo
            ROLE_ARN=$(jq -r '.roleArn' clean.json)
            jq -c '.definition' clean.json > definition.json
            
            # 3. Construção dinâmica do comando (Evita passar argumentos vazios/nulos para a CLI)
            CMD=("aws" "stepfunctions" "update-state-machine" "--state-machine-arn" "$ARN" "--role-arn" "$ROLE_ARN" "--definition" "file://definition.json")

            # Verifica se as chaves opcionais existem no arquivo limpo antes de anexá-las
            if jq -e '.loggingConfiguration' clean.json > /dev/null; then
              jq -c '.loggingConfiguration' clean.json > logging.json
              CMD+=("--logging-configuration" "file://logging.json")
            fi

            if jq -e '.tracingConfiguration' clean.json > /dev/null; then
              jq -c '.tracingConfiguration' clean.json > tracing.json
              CMD+=("--tracing-configuration" "file://tracing.json")
            fi

            # 4. Executa o comando construído
            "${CMD[@]}"
            
            rm clean.json definition.json logging.json tracing.json || true
          done
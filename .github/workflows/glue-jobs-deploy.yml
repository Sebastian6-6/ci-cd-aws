name: CD Glue Jobs - Sync

on:
  push:
    branches: [main]
    paths: ['glue/jobs/**']

permissions:
  id-token: write
  contents: read

jobs:
  deploy-jobs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-2

      - name: Update Glue Jobs and Tags
        run: |
          set -euo pipefail
          
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          REGION="us-east-2"

          for file in glue/jobs/*.json; do
            [ -e "$file" ] || continue
            
            # Extração segura do nome, com fallback para o nome do arquivo
            NAME=$(jq -r '.JobName // empty' "$file")
            if [ -z "$NAME" ]; then NAME=$(basename "$file" .json); fi
            
            echo "--- Atualizando Job: $NAME ---"
            
            jq -c '.JobUpdate | del(..|nulls)' "$file" > update_payload.json
            aws glue update-job --job-name "$NAME" --job-update file://update_payload.json
            
            HAS_TAGS=$(jq 'if .Tags and (.Tags | length > 0) then 1 else 0 end' "$file")
            
            if [ "$HAS_TAGS" -eq 1 ]; then
              echo "Aplicando Tags de Governança..."
              JOB_ARN="arn:aws:glue:${REGION}:${ACCOUNT_ID}:job/${NAME}"
              
              # A API prefere receber o JSON nativo ao invés da string convertida
              jq -c '.Tags | del(..|nulls)' "$file" > tags_payload.json
              
              aws glue tag-resource --resource-arn "$JOB_ARN" --tags-to-add file://tags_payload.json
              rm -f tags_payload.json
            fi
            
            rm -f update_payload.json
          done
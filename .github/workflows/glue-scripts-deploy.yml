name: CD Glue Scripts - S3 Sync

on:
  push:
    branches: [main]
    paths: ['glue/scripts/**']

permissions:
  id-token: write
  contents: read

jobs:
  deploy-scripts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-2

      - name: Safety Check and Sync Scripts
        run: |
          FILE_COUNT=$(find glue/scripts -maxdepth 1 -type f | wc -l)
          echo "Scripts encontrados: $FILE_COUNT"

          if [ "$FILE_COUNT" -eq 0 ]; then
            echo "❌ ERRO: Pasta glue/scripts/ vazia. Abortando para proteger o S3."
            exit 1
          fi

          aws s3 sync glue/scripts/ s3://scripts-automacao-pedro/artifacts/scripts/ --delete
          echo "✅ Scripts sincronizados com sucesso."
name: CD EventBridge - Update Only

on:
  push:
    branches: [main]
    paths: ['eventbridge/**']

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-2

      # --- BLOCO 1: SCHEDULES (CRONOGRAMAS) ---
      - name: Update Existing Schedules
        run: |
          if [ -d "eventbridge/cronogramas" ]; then
            for file in eventbridge/cronogramas/*.json; do
              NAME=$(basename "$file" .json)
              echo "Validando Schedule: $NAME"
              
              # Tenta atualizar. Se falhar (ResourceNotFound), o workflow quebra.
              aws scheduler update-schedule --name "$NAME" \
                --schedule-expression-timezone "America/Sao_Paulo" \
                --cli-input-json "file://$file"
              
              echo "✅ Schedule $NAME atualizado."
            done
          fi

      # --- BLOCO 2: RULES (REGRAS) ---
      - name: Update Existing Rules
        run: |
          if [ -d "eventbridge/regras" ]; then
            for file in eventbridge/regras/*.json; do
              NAME=$(basename "$file" .json)
              echo "Validando Rule: $NAME"

              # Passo de checagem obrigatório para evitar criação automática
              if aws events describe-rule --name "$NAME" > /dev/null 2>&1; then
                aws events put-rule --name "$NAME" --cli-input-json "file://$file"
                echo "✅ Rule $NAME atualizada."
              else
                echo "❌ ERRO: Rule $NAME não existe no console. Crie-a manualmente antes de versionar."
                exit 1
              fi
            done
          fi
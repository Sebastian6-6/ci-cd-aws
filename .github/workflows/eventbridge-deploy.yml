name: CD EventBridge

on:
  push:
    branches: [main]
    paths: ['eventbridge/**']

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-2
      
      - name: Deploy Schedules (Cronogramas)
        run: |
          if [ -d "eventbridge/cronogramas" ]; then
            for file in eventbridge/cronogramas/*.json; do
              NAME=$(basename "$file" .json)
              echo "Atualizando Schedule: $NAME"
              aws scheduler update-schedule --name "$NAME" \
                --schedule-expression-timezone "America/Sao_Paulo" \
                --cli-input-json "file://$file"
            done
          fi

      - name: Deploy Schedules (Check-then-Act)
        run: |
          if [ -d "eventbridge/cronogramas" ]; then
            for file in eventbridge/cronogramas/*.json; do
              NAME=$(basename "$file" .json)
              
              # Tenta buscar o nome do schedule. Se não achar, a variável fica "NOT_FOUND"
              # O '2>/dev/null' impede que o erro da AWS quebre o shell aqui
              EXISTS=$(aws scheduler get-schedule --name "$NAME" --query "Name" --output text 2>/dev/null || echo "NOT_FOUND")

              if [ "$EXISTS" == "NOT_FOUND" ]; then
                echo "🚀 Criando novo Schedule: $NAME"
                aws scheduler create-schedule --name "$NAME" \
                  --schedule-expression-timezone "America/Sao_Paulo" \
                  --cli-input-json "file://$file"
              else
                echo "🔄 Atualizando Schedule existente: $NAME"
                aws scheduler update-schedule --name "$NAME" \
                  --schedule-expression-timezone "America/Sao_Paulo" \
                  --cli-input-json "file://$file"
              fi
            done
          fi
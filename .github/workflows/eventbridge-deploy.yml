name: CD EventBridge

on:
  push:
    branches: [main]
    paths: ['eventbridge/**']

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-2
      
      - name: Deploy Schedules (Cronogramas)
        run: |
          if [ -d "eventbridge/cronogramas" ]; then
            for file in eventbridge/cronogramas/*.json; do
              NAME=$(basename "$file" .json)
              echo "Atualizando Schedule: $NAME"
              aws scheduler update-schedule --name "$NAME" \
                --schedule-expression-timezone "America/Sao_Paulo" \
                --cli-input-json "file://$file"
            done
          fi

      - name: Deploy Schedules (Cronogramas)
        run: |
          if [ -d "eventbridge/cronogramas" ]; then
            for file in eventbridge/cronogramas/*.json; do
              NAME=$(basename "$file" .json)
              echo "--- Processando Schedule: $NAME ---"

              # 1. Verifica se o Schedule já existe (Silencia o erro se não existir)
              CHECK_EXISTS=$(aws scheduler get-schedule --name "$NAME" --query "Name" --output text 2>/dev/null || echo "NOT_FOUND")

              if [ "$CHECK_EXISTS" == "NOT_FOUND" ]; then
                echo "🚀 Criando novo Schedule..."
                aws scheduler create-schedule --name "$NAME" \
                  --schedule-expression-timezone "America/Sao_Paulo" \
                  --cli-input-json "file://$file"
              else
                echo "🔄 Atualizando Schedule existente..."
                aws scheduler update-schedule --name "$NAME" \
                  --schedule-expression-timezone "America/Sao_Paulo" \
                  --cli-input-json "file://$file"
              fi
              echo "✅ $NAME sincronizado com sucesso."
            done
          fi
name: CD EventBridge Rules - Sync

on:
  push:
    branches: [main]
    paths: ['eventbridge/regras/**']

permissions:
  id-token: write
  contents: read

jobs:
  deploy-rules:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-2

      - name: Update EventBridge Rules
        run: |
          # Garante que qualquer erro pare a pipeline imediatamente
          set -euo pipefail
          
          for file in eventbridge/regras/*.json; do
            [ -e "$file" ] || continue
            NAME=$(basename "$file" .json)
            echo "--- Atualizando Regra: $NAME ---"
            
            # Extrai e formata a Rule. O tojson garante que o EventPattern vire string se for objeto
            jq -c 'del(..|nulls) | .Rule | if type == "object" and .EventPattern then .EventPattern |= (if type == "string" then . else tojson end) else . end' "$file" > rule_cli.json
            
            aws events put-rule --name "$NAME" --cli-input-json file://rule_cli.json
            
            # Navegação segura: verifica se a chave Targets existe e tem elementos
            HAS_TARGETS=$(jq 'if .Targets and (.Targets | length > 0) then 1 else 0 end' "$file")
            
            if [ "$HAS_TARGETS" -eq 1 ]; then
              echo "Atualizando Targets..."
              jq -c 'del(..|nulls) | .Targets' "$file" > targets_cli.json
              aws events put-targets --rule "$NAME" --targets file://targets_cli.json
              rm -f targets_cli.json
            fi
            
            rm -f rule_cli.json
          done
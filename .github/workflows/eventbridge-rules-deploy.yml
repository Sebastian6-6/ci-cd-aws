name: CD EventBridge Rules - Sync

on:
  push:
    branches: [main]
    paths: ['eventbridge/regras/**']

permissions:
  id-token: write
  contents: read

jobs:
  deploy-rules:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-2

      - name: Update EventBridge Rules
        run: |
          for file in eventbridge/regras/*.json; do
            [ -e "$file" ] || continue
            NAME=$(basename "$file" .json)
            echo "--- Atualizando Regra: $NAME ---"
            
            # Higieniza TODOS os nulls antes de formatar para o CLI
            jq 'del(..|nulls)' "$file" > clean.json
            
            RULE_JSON=$(jq -c '.Rule | .EventPattern = (.EventPattern | tojson)' clean.json)
            TARGETS_JSON=$(jq -c '.Targets' clean.json)
            
            # put-rule atua como update nativamente se a regra existir
            aws events put-rule --cli-input-json "$RULE_JSON"
            
            TARGET_COUNT=$(jq '.Targets | length' clean.json)
            if [ "$TARGET_COUNT" -gt 0 ]; then
              aws events put-targets --rule "$NAME" --targets "$TARGETS_JSON"
            fi
            
            rm clean.json
          done